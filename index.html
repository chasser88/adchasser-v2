  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AdChasser — Brand Campaign Intelligence Platform. Measure whether your campaign was consumed, understood and impactful." />
    <title>AdChasser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #07090F; color: #E2E6F3; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
      .fade-up { animation: fadeUp 0.4s ease forwards; }
    </style>
  </head>
